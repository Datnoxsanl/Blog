version: '3.9'

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: blog_edu

  app:
    build:
      context: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - HOST=${HOST:-0.0.0.0}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/blog_edu}
      - MONGODB_NAME=${MONGODB_NAME:-blog_edu}
      - SESSION_SECRET=${SESSION_SECRET:-secret_change_me}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      - mongo
    volumes:
      - .:/usr/src/app:cached
    command: npm start

volumes:
  mongo-data:
    name: blog_mongo_data
